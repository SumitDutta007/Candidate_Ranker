ai_usage_summary: |
  - AI tools were used to accelerate development through architecture discussions,
  code review, debugging, documentation, and refactoring suggestions.
  ChatGPT assisted with designing the modular ranking pipeline, improving scoring
  strategies, optimizing CPU performance, and preparing project documentation.
  - Claude was used for code completion and boilerplate generation.
  All engineering decisions, system design, implementation, testing, tuning,
  and final validation were performed by the team. No hosted AI services or
  external APIs are used during candidate ranking or inference.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  We developed a modular hybrid candidate ranking engine for large-scale offline
  recruitment under CPU-only constraints. The pipeline begins by analyzing the
  job description to extract required skills, experience range, seniority, and
  domain-specific keywords. A query expansion layer improves retrieval recall by
  adding semantically related terms before lightweight candidate retrieval,
  efficiently reducing the search space while preserving relevant profiles.

  Retrieved candidates are evaluated using a hybrid scoring framework that
  combines semantic similarity, skill relevance, experience fit, domain
  expertise, company background, recruiter behavioral signals, and honeypot
  detection. The highest-ranked candidates are then shortlisted using semantic
  ranking to maximize precision while maintaining computational efficiency.

  Finally, an explainability module generates concise, human-readable reasoning
  for every shortlisted candidate using only verified profile attributes,
  ensuring transparent and trustworthy recommendations. The complete pipeline
  runs entirely offline without external APIs, is optimized for large candidate
  pools within the competition's compute constraints, and produces an
  explainable Top-100 ranked shortlist suitable for recruiter review."

